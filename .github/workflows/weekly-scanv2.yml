name: Weekly Signal scan

on:
  schedule:
    # Every Monday at 07:00 UTC. Adjust to your timezone —
    # NZST/NZDT is UTC+12/+13, so 07:00 UTC ≈ 19:00/20:00 in Auckland.
    - cron: "0 7 * * 1"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

permissions:
  contents: write   # needed so the workflow can commit the updated state file

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scan
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python scan.py

      - name: Commit updated state
        run: |
          git config user.name "signal-bot"
          git config user.email "signal-bot@users.noreply.github.com"
          git add seen_ids.json docs/results.json
          git diff --cached --quiet && echo "No state change" || git commit -m "Update scan results [skip ci]"
          git push
